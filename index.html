<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PT_Dave AI Clinic</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://js.paystack.co/v1/inline.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; text-align: center; background: #121212; color: white; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: auto; }
        #canvas_container { position: relative; width: 100%; border-radius: 15px; overflow: hidden; background: #000; aspect-ratio: 4/3; }
        canvas { width: 100%; height: 100%; }
        .stats { background: #1e1e1e; padding: 15px; border-radius: 10px; margin-top: 10px; border: 1px solid #333; }
        input, button { width: 100%; padding: 15px; margin: 10px 0; border-radius: 8px; border: none; font-size: 16px; box-sizing: border-box; }
        input { background: #222; color: white; border: 1px solid #444; }
        button { background: #00ff88; color: black; font-weight: bold; cursor: pointer; }
        #server_response { color: #00ff88; font-size: 14px; margin-top: 10px; min-height: 1.2em; }
    </style>
</head>
<body>

    <div class="container">
        <h2>🦾 PT_Dave AI Clinic</h2>
        
        <div id="canvas_container">
            <video id="input_video" playsinline webkit-playsinline muted autoplay loop style="display:none;"></video>
            <canvas id="output_canvas"></canvas>
        </div>

        <div class="stats">
            <div>Current Neck Angle: <span id="angle_display">0</span>°</div>
        </div>

        <input type="email" id="user_email" placeholder="Enter Email for Report" required>
        
        <div style="text-align: left; margin: 10px 0;">
            <input type="checkbox" id="numbness_check" style="width: auto;"> 
            <label for="numbness_check">I feel numbness in my hands</label>
        </div>

        <button id="diagnose_btn">RUN AI DIAGNOSIS</button>
        <div id="server_response">Waiting for camera...</div>
    </div>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const statusDiv = document.getElementById('server_response');
        let currentNeckAngle = 0;

        function logStatus(msg) { statusDiv.innerText = msg; }

        // --- 1. AI ENGINE SETUP ---
        const pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`});
        pose.setOptions({ modelComplexity: 0, smoothLandmarks: true, minDetectionConfidence: 0.5 });
        
        pose.onResults((results) => {
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
            if (results.poseLandmarks) {
                const ear = results.poseLandmarks[8];
                const shoulder = results.poseLandmarks[12];
                const dx = ear.x - shoulder.x; 
                const dy = ear.y - shoulder.y; 
                currentNeckAngle = Math.abs((Math.atan2(dx, -dy) * 180) / Math.PI);
                document.getElementById('angle_display').innerText = currentNeckAngle.toFixed(1);
            }
            canvasCtx.restore();
        });

        // --- 2. THE IPHONE-READY CAMERA START ---
        async function startCamera() {
            logStatus("Accessing Camera...");
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'user', width: 640, height: 480 } 
                });
                videoElement.srcObject = stream;
                await videoElement.play();
                
                logStatus("Camera Live. Loading AI...");
                const camera = new Camera(videoElement, {
                    onFrame: async () => { await pose.send({image: videoElement}); },
                    width: 640, height: 480
                });
                await camera.start();
                logStatus("System Ready.");
            } catch (err) {
                logStatus("Error: Please allow camera & refresh.");
            }
        }
        
        startCamera();

        // --- 3. THE DIAGNOSIS & PAYSTACK LOGIC ---
        document.getElementById('diagnose_btn').onclick = async () => {
            const email = document.getElementById('user_email').value;
            if(!email) return alert("Please enter your email.");
            
            logStatus("Consulting PT_Dave Brain...");
            
            try {
                const response = await fetch("https://pt-dave-api--ptdaveofficial.replit.app/diagnose", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({
                        angle: currentNeckAngle,
                        numbness: document.getElementById('numbness_check').checked,
                        email: email
                    })
                });
                
                const data = await response.json();
                logStatus(data.message);

                if(data.price > 0) {
                    let handler = PaystackPop.setup({
                        key: 'pk_test_82888d3572f50973c6fdaf2d556454a794747d9a',
                        email: email,
                        amount: data.price * 100, 
                        currency: 'NGN',
                        callback: function(res) {
                            alert('Success! Your clinical plan is being prepared.');
                        }
                    });
                    handler.openIframe();
                }
            } catch (error) {
                logStatus("Backend Connection Error.");
            }
        };
    </script>
</body>
</html>
