<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NoT_tHaT_kInD_oF_pHySiO // PT_Dave AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
    <script src="https://js.paystack.co/v1/inline.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;700;800&family=Space+Mono&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #1e293b; overflow-x: hidden; margin: 0; }
        .mono { font-family: 'Space Mono', monospace; }
        #neural-pulse { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.1; pointer-events: none; }
        .video-container { position: relative; width: 95%; max-width: 450px; aspect-ratio: 4/3; margin: 0 auto 20px; border-radius: 24px; overflow: hidden; background: #000; border: 2px solid rgba(37, 99, 235, 0.2); }
        #output_canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; }
        #input_video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); visibility: hidden; }
        .premium-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border-radius: 32px; border: 1px solid rgba(255, 255, 255, 0.5); padding: 24px; }
        .pt-dave-overlay { position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); background: rgba(15, 23, 42, 0.9); color: #3b82f6; padding: 8px 16px; border-radius: 99px; font-size: 8px; font-weight: 800; letter-spacing: 0.2em; text-transform: uppercase; border: 1px solid rgba(59, 130, 246, 0.3); z-index: 10; }
    </style>
</head>
<body class="flex flex-col min-h-screen pt-6">
    <canvas id="neural-pulse"></canvas>
    <div class="max-w-xl mx-auto p-4 flex-grow w-full">
        <div class="text-center mb-6">
            <h1 class="text-3xl font-extrabold text-slate-900 italic uppercase tracking-tighter leading-none">NoT_tHaT_kInD_oF_pHySiO</h1>
            <p class="text-blue-600 mono text-[9px] tracking-[0.3em] uppercase font-black">Neural Interface v3.0</p>
        </div>

        <div class="video-container">
            <video id="input_video" playsinline></video>
            <canvas id="output_canvas"></canvas>
            <div id="status-overlay" class="pt-dave-overlay italic">Neural Link Active</div>
        </div>

        <div class="premium-card shadow-xl">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-sm font-black text-slate-900 uppercase italic">Clinical Intake</h3>
                <button id="veto-btn" onclick="triggerVetoAction()" class="bg-slate-200 text-slate-500 text-[8px] px-4 py-2 rounded-full font-black uppercase tracking-widest border border-slate-300">Manual Veto</button>
            </div>

            <div id="veto-alert" class="hidden p-3 mb-4 bg-red-50 border border-red-500 rounded-2xl text-center">
                <p class="text-red-700 text-[9px] font-black uppercase">🚨 LOCKDOWN: RED FLAG DETECTED 🚨</p>
            </div>

            <div class="space-y-4">
                <input type="email" id="email" placeholder="Identity (Email)" class="w-full bg-white border border-slate-100 p-3 rounded-xl text-sm outline-none focus:ring-2 focus:ring-blue-50 transition">
                <select id="main-issue" class="w-full bg-white border border-slate-100 p-3 rounded-xl text-sm outline-none">
                    <option value="">Select Deficiency...</option>
                    <option value="Sciatica/Back Pain">Back Pain / Sciatica</option>
                    <option value="Stroke Recovery">Stroke Recovery</option>
                </select>
            </div>

            <div class="mt-6 p-4 bg-slate-900 rounded-2xl">
                <p class="text-[8px] font-black text-blue-400 uppercase tracking-widest mb-3 italic">Safety Triage (Box 1.3)</p>
                <div class="grid grid-cols-1 gap-2">
                    <label class="flex items-center space-x-2 text-white/80 text-[10px] font-bold">
                        <input type="checkbox" class="redflag accent-red-600" value="Bladder Control"> <span>Bladder/Bowel Dysfunction</span>
                    </label>
                    <label class="flex items-center space-x-2 text-white/80 text-[10px] font-bold">
                        <input type="checkbox" class="redflag accent-red-600" value="Saddle Numbness"> <span>Saddle Anesthesia</span>
                    </label>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 mt-8">
                <button onclick="pay(5000, 'Baseline')" class="bg-blue-600 text-white text-[9px] font-black py-4 rounded-xl uppercase tracking-widest shadow-md">Scan (₦5k)</button>
                <button onclick="pay(10000, 'Expert')" class="bg-purple-600 text-white text-[9px] font-black py-4 rounded-xl uppercase tracking-widest shadow-md">Expert (₦10k)</button>
            </div>
        </div>
    </div>

    <script>
        // HEART PULSE MATH
        const pulseCanvas = document.getElementById('neural-pulse');
        const pCtx = pulseCanvas.getContext('2d');
        pulseCanvas.width = window.innerWidth; pulseCanvas.height = window.innerHeight;
        function drawEverlasting(t) {
            pCtx.clearRect(0, 0, pulseCanvas.width, pulseCanvas.height);
            pCtx.beginPath(); pCtx.strokeStyle = '#2563eb'; pCtx.lineWidth = 0.5;
            for (let i = 0; i < Math.PI * 2; i += 0.02) {
                let x = 16 * Math.pow(Math.sin(i), 3);
                let y = -(13 * Math.cos(i) - 5 * Math.cos(2*i) - 2 * Math.cos(3*i) - Math.cos(4*i));
                let drawX = pulseCanvas.width/2 + x * (10 + Math.sin(t) * 2);
                let drawY = pulseCanvas.height/2 + y * (10 + Math.sin(t) * 2);
                if (i === 0) pCtx.moveTo(drawX, drawY); else pCtx.lineTo(drawX, drawY);
            }
            pCtx.stroke(); requestAnimationFrame(() => drawEverlasting(t + 0.03));
        }
        drawEverlasting(0);

        let isVetoActive = false;
        let redFlagActive = false;

        // WATCHER FOR RED FLAGS
        document.querySelectorAll('.redflag').forEach(box => {
            box.addEventListener('change', function() {
                if (this.checked) {
                    redFlagActive = true;
                    isVetoActive = true;
                    // Activate Veto UI
                    document.getElementById('veto-alert').classList.remove('hidden');
                    const btn = document.getElementById('veto-btn');
                    btn.classList.remove('bg-slate-200', 'text-slate-500', 'border-slate-300');
                    btn.classList.add('bg-red-600', 'text-white', 'border-red-700', 'animate-pulse');
                    btn.innerText = "CONTACT MOSES";
                    document.getElementById('status-overlay').style.background = "#ef4444";
                    document.getElementById('status-overlay').innerText = "VETO: RED FLAG DETECTED";
                }
            });
        });

        function triggerVetoAction() {
            if (!redFlagActive) {
                alert("Manual Veto is only authorized for red-flag symptoms. Please complete your intake or scan.");
                return;
            }
            const msg = encodeURIComponent("🚨 RED FLAG VETO 🚨\nClinical symptoms detected during intake. Moses, I need an immediate specialist review.");
            window.location.href = `https://wa.me/2349033325615?text=${msg}`;
        }

        function pay(amount, tier) {
            const email = document.getElementById('email').value;
            if (!email.includes('@')) { alert("Email Identity Required."); return; }
            PaystackPop.setup({
                key: 'pk_live_ef67461cd9b75a09bf05c7c5c588dea850470cdf',
                email: email, amount: amount * 100, currency: "NGN",
                callback: function(res) {
                    window.location.href = `https://wa.me/2349033325615?text=REHAB_AUTHORIZED_${tier}_USER_${email}`;
                }
            }).openIframe();
        }

        // CAMERA SYSTEM
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        function onResults(results) {
            if (isVetoActive) return;
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
            if (results.poseLandmarks) {
                drawConnectors(canvasCtx, results.poseLandmarks, POSE_CONNECTIONS, {color: '#2563eb', lineWidth: 2});
                drawLandmarks(canvasCtx, results.poseLandmarks, {color: '#ffffff', lineWidth: 1, radius: 1});
            }
            canvasCtx.restore();
        }
        const pose = new Pose({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}` });
        pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.6 });
        pose.onResults(onResults);
        new Camera(videoElement, { onFrame: async () => { await pose.send({image: videoElement}); }, width: 640, height: 480 }).start();
    </script>
</body>
</html>
