<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PT_Dave AI Clinic</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://js.paystack.co/v1/inline.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #121212; color: white; margin: 0; padding: 20px; }
        #canvas_container { width: 100%; border-radius: 15px; overflow: hidden; background: #000; aspect-ratio: 4/3; border: 2px solid #333; }
        canvas { width: 100%; height: 100%; display: block; }
        input, button { width: 100%; padding: 15px; margin: 10px 0; border-radius: 8px; border: none; font-size: 16px; box-sizing: border-box; }
        .btn-pay { background: #00ff88; color: black; font-weight: bold; cursor: pointer; }
        #response_box { background: #1e1e1e; padding: 20px; border-radius: 10px; margin-top: 20px; text-align: left; display: none; border: 1px solid #00ff88; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🦾 PT_Dave AI Clinic</h2>
        <button onclick="startCamera()" style="background:#444; color:white;">1. ACTIVATE SCANNER</button>
        <div id="canvas_container">
            <video id="input_video" playsinline webkit-playsinline muted style="display:none;"></video>
            <canvas id="output_canvas"></canvas>
        </div>
        <p>Neck Angle: <span id="angle_display" style="color:#00ff88; font-weight:bold;">0</span>°</p>
        <input type="email" id="user_email" placeholder="Enter Patient Email">
        <label style="display:block; margin: 10px 0;"><input type="checkbox" id="numbness"> I feel hand numbness</label>
        <button id="diagnose_btn" class="btn-pay">2. GET PT_DAVE DIAGNOSIS</button>
        <div id="response_box"></div>
    </div>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        let currentAngle = 0;

        const pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`});
        pose.setOptions({modelComplexity: 0, minDetectionConfidence: 0.5});
        
        pose.onResults((res) => {
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(res.image, 0, 0, canvasElement.width, canvasElement.height);
            if(res.poseLandmarks) {
                const ear = res.poseLandmarks[8];
                const shoulder = res.poseLandmarks[12];
                currentAngle = Math.abs((Math.atan2(ear.x - shoulder.x, -(ear.y - shoulder.y)) * 180) / Math.PI);
                document.getElementById('angle_display').innerText = currentAngle.toFixed(1);
            }
        });

        async function startCamera() {
            videoElement.play();
            const camera = new Camera(videoElement, {onFrame: async () => { await pose.send({image: videoElement}) }, width: 640, height: 480});
            camera.start();
        }

        document.getElementById('diagnose_btn').onclick = async () => {
            const email = document.getElementById('user_email').value;
            const resBox = document.getElementById('response_box');
            if(!email) return alert("Email required.");
            
            resBox.style.display = "block";
            resBox.innerHTML = "Processing clinical data...";

            try {
                // THIS IS THE BRAIN CONNECTION
                const response = await fetch("https://pt-dave-api--ptdaveofficial.replit.app/diagnose", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({angle: currentAngle, numbness: document.getElementById('numbness').checked, email: email})
                });
                const data = await response.json();
                resBox.innerHTML = data.message;

                if(data.price > 0) {
                    PaystackPop.setup({
                        key: 'pk_test_82888d3572f50973c6fdaf2d556454a794747d9a',
                        email: email,
                        amount: data.price * 100,
                        currency: 'NGN',
                        callback: () => { alert("Payment Successful!"); }
                    }).openIframe();
                }
            } catch (e) { 
                resBox.innerHTML = "Connection Error. Is Replit running?"; 
            }
        };
    </script>
</body>
</html>
