<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTKOP | Diagnostic Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: #ffffff; font-family: ui-sans-serif, system-ui; overflow-x: hidden; }
        .glass { background: rgba(23, 23, 23, 0.8); backdrop-filter: blur(12px); border: 1px solid #333; }
        #video-container { position: relative; width: 100%; aspect-ratio: 3/4; background: #000; border-radius: 1.5rem; overflow: hidden; border: 2px solid #222; }
        video { transform: scaleX(-1); width: 100%; height: 100%; object-fit: cover; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); }
        .scanning-bar { position: absolute; width: 100%; height: 4px; background: linear-gradient(to bottom, transparent, #22c55e); box-shadow: 0 4px 10px #22c55e; animation: scan 3s linear infinite; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
    </style>
</head>
<body class="p-4 max-w-lg mx-auto">
    
    <header class="text-center py-8">
        <h1 class="text-2xl font-black tracking-widest uppercase italic">NoT_tHaT_kInD_oF_pHySiO</h1>
        <p class="text-[10px] text-green-500 tracking-[0.3em] font-bold mt-1">HIGH-TECH CLINICAL VISION</p>
    </header>

    <div id="video-container" class="mb-6 shadow-2xl shadow-green-900/10">
        <div class="scanning-bar"></div>
        <video id="webcam" autoplay playsinline></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-6">
        <div class="glass p-5 rounded-3xl text-center">
            <p class="text-[10px] text-gray-500 uppercase font-bold mb-1">Joint Angle</p>
            <span id="angleDisplay" class="text-5xl font-mono font-black text-green-400">--°</span>
        </div>
        <div class="glass p-5 rounded-3xl text-center flex flex-col justify-center">
            <p class="text-[10px] text-gray-500 uppercase font-bold mb-1">Clinic Status</p>
            <span id="statusDisplay" class="text-xs font-black uppercase tracking-tighter text-gray-400">System Ready</span>
        </div>
    </div>

    <div class="glass p-2 rounded-2xl mb-8">
        <input id="patientName" type="text" placeholder="PATIENT IDENTIFIER" class="w-full bg-transparent p-4 focus:outline-none text-center uppercase text-sm tracking-widest font-bold">
    </div>

    <div class="flex flex-col gap-4 mb-12">
        <button id="webcamButton" class="w-full bg-white text-black font-black py-5 rounded-2xl active:scale-95 transition-all uppercase tracking-widest text-sm">Start AI Engine</button>
        <button id="saveButton" class="w-full bg-green-600 text-white font-black py-5 rounded-2xl active:scale-95 transition-all uppercase tracking-widest text-sm shadow-xl shadow-green-900/40">Sync to Frankfurt</button>
    </div>

    <script type="module">
        import { PoseLandmarker, FilesetResolver, DrawingUtils } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0";

        // --- 1. SUPABASE CONNECTION ---
        const SUPABASE_URL = "https://yrqlaljrceyupuptrniaj.supabase.co";
        const SUPABASE_KEY = "sb_publishable_0fSp1dxo-j6tnSfpBeAZ5Q_SMQebX19"; 
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- 2. ELEMENTS & STATE ---
        const video = document.getElementById("webcam");
        const canvasElement = document.getElementById("output_canvas");
        const canvasCtx = canvasElement.getContext("2d");
        const angleDisplay = document.getElementById("angleDisplay");
        const statusDisplay = document.getElementById("statusDisplay");

        let poseLandmarker;
        let webcamRunning = false;
        let lastAngle = 0;
        let lastStatus = "Awaiting";

        // --- 3. AI INITIALIZATION ---
        const initAI = async () => {
            const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm");
            poseLandmarker = await PoseLandmarker.createFromOptions(vision, {
                baseOptions: { 
                    modelAssetPath: `https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task`, 
                    delegate: "GPU" 
                },
                runningMode: "VIDEO"
            });
            statusDisplay.innerText = "AI Ready";
        };
        initAI();

        const getAngle = (a, b, c) => {
            let rad = Math.atan2(c.y - b.y, c.x - b.x) - Math.atan2(a.y - b.y, a.x - b.x);
            let ang = Math.abs(rad * 180.0 / Math.PI);
            return ang > 180 ? 360 - ang : ang;
        };

        async function predict() {
            if (!webcamRunning) return;
            canvasElement.width = video.videoWidth;
            canvasElement.height = video.videoHeight;

            const results = poseLandmarker.detectForVideo(video, performance.now());
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

            if (results.landmarks && results.landmarks.length > 0) {
                const pts = results.landmarks[0];
                const hip = pts[24]; const knee = pts[26]; const ankle = pts[28];
                
                const ang = getAngle(hip, knee, ankle).toFixed(1);
                lastAngle = parseFloat(ang);
                angleDisplay.innerText = `${ang}°`;
                
                lastStatus = ang > 150 ? "Full Extension" : (ang < 90 ? "Deep Flexion" : "Mid-Range");
                statusDisplay.innerText = lastStatus;
                statusDisplay.className = "text-xs font-black uppercase text-green-400";

                const du = new DrawingUtils(canvasCtx);
                du.drawConnectors(pts, PoseLandmarker.POSE_CONNECTIONS, { color: '#ffffff33', lineWidth: 2 });
                du.drawLandmarks([hip, knee, ankle], { color: '#22c55e', lineWidth: 4, radius: 6 });
            }
            requestAnimationFrame(predict);
        }

        // --- 4. ACTION TRIGGERS ---
        document.getElementById("webcamButton").onclick = async () => {
            if (!webcamRunning) {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
                webcamRunning = true;
                predict();
                document.getElementById("webcamButton").innerText = "Kill Scanner";
                document.getElementById("webcamButton").className = "w-full bg-zinc-800 text-red-500 font-black py-5 rounded-2xl uppercase tracking-widest text-sm border border-red-900/30";
            } else {
                location.reload(); // Quick reset
            }
        };

        document.getElementById("saveButton").onclick = async () => {
            const name = document.getElementById("patientName").value || "Walk-in Patient";
            statusDisplay.innerText = "Syncing...";
            
            const { error } = await _supabase.from('patient_scans').insert([{ 
                patient_name: name, 
                joint_type: 'Knee', 
                angle_detected: lastAngle, 
                risk_status: lastStatus 
            }]);

            if (error) {
                alert("Sync Failed: " + error.message);
                statusDisplay.innerText = "Error";
            } else {
                alert("✅ SUCCESS: Data Secured in Frankfurt Database.");
                statusDisplay.innerText = "Data Synced";
            }
        };
    </script>
</body>
</html>
