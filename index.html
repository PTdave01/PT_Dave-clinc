<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoT_tHaT_kInD_oF_pHySiO | AI Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
    <script src="https://js.paystack.co/v1/inline.js"></script> 
    <style>
        body { background-color: #0a0a0a; color: #00ffcc; font-family: 'Courier New', monospace; padding: 20px; text-align: center;}
        video { display: none; }
        canvas { border: 2px solid #00ffcc; border-radius: 12px; background: #000; width: 100%; max-width: 500px; height: auto;}
        .panel { background: #1a1a1a; padding: 20px; border-radius: 12px; margin-top: 20px; text-align: left; max-width: 500px; margin-left: auto; margin-right: auto;}
        button { padding: 15px; width: 100%; background: #00ffcc; color: #000; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; font-size: 16px; margin-top: 15px;}
        input[type="email"] { width: 92%; padding: 12px; margin-bottom: 15px; background: #333; border: 1px solid #444; color: #fff; border-radius: 5px;}
        .metric { font-size: 1.2rem; margin: 10px 0; color: #fff; }
    </style>
</head>
<body>
    <h2>PT_DAVE AI SCANNER</h2>
    <video id="input_video"></video>
    <canvas id="output_canvas" width="640" height="480"></canvas>
    
    <div class="metric">Neck Angle: <span id="angle_display" style="color:#00ffcc">0</span>°</div>

    <div class="panel">
        <input type="email" id="user_email" placeholder="Patient Email (for results)">
        <label style="display:block; margin-bottom: 10px;">
            <input type="checkbox" id="numbness_check"> Numbness/Tingling in arms?
        </label>
        <button id="diagnose_btn">RUN AI DIAGNOSIS</button>
        <div id="server_response" style="margin-top: 15px; color: #fff; line-height: 1.5;"></div>
    </div>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        let currentNeckAngle = 0;

        // --- 1. COMPUTER VISION ENGINE ---
        const pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`});
        pose.setOptions({modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5});
        
        pose.onResults((results) => {
            canvasCtx.clearRect(0, 0, 640, 480);
            canvasCtx.drawImage(results.image, 0, 0, 640, 480);
            if (results.poseLandmarks) {
                const ear = results.poseLandmarks[8];
                const shoulder = results.poseLandmarks[12];
                const dx = ear.x - shoulder.x; 
                const dy = ear.y - shoulder.y; 
                currentNeckAngle = Math.abs((Math.atan2(dx, -dy) * 180) / Math.PI);
                document.getElementById('angle_display').innerText = currentNeckAngle.toFixed(1);
            }
        });

        const camera = new Camera(videoElement, {
            onFrame: async () => { await pose.send({image: videoElement}); },
            width: 640, height: 480 
        });
        camera.start();

        // --- 2. PERMANENT BACKEND CONNECTION ---
        document.getElementById('diagnose_btn').onclick = async () => {
            const email = document.getElementById('user_email').value;
            const statusDiv = document.getElementById('server_response');
            if(!email) return alert("Please enter an email for the clinical record.");

            statusDiv.innerText = "Consulting the Brain...";

            try {
                // YOUR NEW PERMANENT REPLIT LINK:
                const response = await fetch("https://pt-dave-api--ptdaveofficial.replit.app/diagnose", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({
                        angle: currentNeckAngle,
                        numbness: document.getElementById('numbness_check').checked,
                        email: email
                    })
                });

                const data = await response.json();
                statusDiv.innerText = data.message;

                // --- 3. PAYSTACK POPUP ---
                if(data.price > 0) {
                    let handler = PaystackPop.setup({
                        key: 'pk_test_YOUR_PAYSTACK_KEY', // Swap this with your key in the morning!
                        email: email,
                        amount: data.price * 100, 
                        currency: 'NGN',
                        callback: function(res) {
                            alert('Payment Success! Check your email for the plan.');
                        }
                    });
                    handler.openIframe();
                }
            } catch (error) {
                statusDiv.innerText = "Connection Error. Check your backend status.";
                console.error(error);
            }
        };
    </script>
</body>
</html>
