<!DOCTYPE html>

        .dot { width: 12px; height: 12px; border-radius: 50%; border: 1px solid #444; }
        .dot.filled { background: #22c55e; border-color: #22c55e; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
