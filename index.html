<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PT_Dave AI Clinic</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://js.paystack.co/v1/inline.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; text-align: center; background: #121212; color: white; margin: 0; padding: 20px; line-height: 1.5; }
        .container { max-width: 500px; margin: auto; }
        #canvas_container { position: relative; width: 100%; border-radius: 15px; overflow: hidden; background: #000; aspect-ratio: 4/3; border: 2px solid #333; }
        canvas { width: 100%; height: 100%; display: block; }
        .stats { background: #1e1e1e; padding: 15px; border-radius: 10px; margin-top: 10px; }
        input, button { width: 100%; padding: 15px; margin: 10px 0; border-radius: 8px; border: none; font-size: 16px; box-sizing: border-box; }
        input { background: #222; color: white; border: 1px solid #444; }
        .btn-pay { background: #00ff88; color: black; font-weight: bold; cursor: pointer; }
        .btn-start { background: #555; color: white; margin-bottom: 5px; cursor: pointer; }
        #server_response { 
            background: #1e1e1e; 
            padding: 15px; 
            border-radius: 10px; 
            margin-top: 20px; 
            text-align: left; 
            font-size: 15px; 
            border-left: 4px solid #00ff88;
            display: none; /* Hidden until diagnosis */
        }
        .whatsapp-link {
            display: block;
            background: #25D366;
            color: white;
            padding: 15px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            text-align: center;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>🦾 PT_Dave AI Clinic</h2>
        
        <button id="start_btn" class="btn-start">TAP TO START CAMERA</button>

        <div id="canvas_container">
            <video id="input_video" playsinline webkit-playsinline muted style="display:none;"></video>
            <canvas id="output_canvas"></canvas>
        </div>

        <div class="stats">
            <div>Neck Angle: <span id="angle_display">0</span>°</div>
        </div>

        <input type="email" id="user_email" placeholder="Email for report">
        
        <div style="text-align: left; margin: 10px 0;">
            <input type="checkbox" id="numbness_check" style="width: auto; height: auto;"> 
            <label for="numbness_check">Do you feel hand numbness?</label>
        </div>

        <button id="diagnose_btn" class="btn-pay">RUN AI DIAGNOSIS</button>
        <div id="server_response"></div>
    </div>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const statusDiv = document.getElementById('server_response');
        let currentNeckAngle = 0;

        const pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`});
        pose.setOptions({ modelComplexity: 0, smoothLandmarks: true, minDetectionConfidence: 0.5 });
        
        pose.onResults((results) => {
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
            if (results.poseLandmarks) {
                const ear = results.poseLandmarks[8];
                const shoulder = results.poseLandmarks[12];
                const dx = ear.x - shoulder.x; 
                const dy = ear.y - shoulder.y; 
                currentNeckAngle = Math.abs((Math.atan2(dx, -dy) * 180) / Math.PI);
                document.getElementById('angle_display').innerText = currentNeckAngle.toFixed(1);
            }
            canvasCtx.restore();
        });

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'user', width: 640, height: 480 } 
                });
                videoElement.srcObject = stream;
                await videoElement.play();
                
                const camera = new Camera(videoElement, {
                    onFrame: async () => { await pose.send({image: videoElement}); },
                    width: 640, height: 480
                });
                await camera.start();
                document.getElementById('start_btn').style.display = 'none';
            } catch (err) {
                alert("Camera Error: Please allow access.");
            }
        }

        document.getElementById('start_btn').onclick = startCamera;

        document.getElementById('diagnose_btn').onclick = async () => {
            const email = document.getElementById('user_email').value;
            if(!email) return alert("Please enter your email.");
            
            statusDiv.style.display = "block";
            statusDiv.innerHTML = "Consulting PT_Dave Brain...";
            
            try {
                const response = await fetch("https://pt-dave-api--ptdaveofficial.replit.app/diagnose", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({
                        angle: currentNeckAngle,
                        numbness: document.getElementById('numbness_check').checked,
                        email: email
                    })
                });
                
                const data = await response.json();
                
                // Formatter: Convert \n to breaks and links to WhatsApp Button
                let cleanMessage = data.message.replace(/\n/g, "<br>");
                let finalHtml = cleanMessage.replace(/(https?:\/\/wa\.me[^\s<]+)/g, '<a href="$1" target="_blank" class="whatsapp-link">MESSAGE PT_DAVE NOW</a>');
                
                statusDiv.innerHTML = finalHtml;

                if(data.price > 0) {
                    let handler = PaystackPop.setup({
                        key: 'pk_test_82888d3572f50973c6fdaf2d556454a794747d9a',
                        email: email,
                        amount: data.price * 100, 
                        currency: 'NGN',
                        callback: function(res) {
                            alert('Payment Success! Use the green button on screen to message PT_Dave.');
                        }
                    });
                    handler.openIframe();
                }
            } catch (error) {
                statusDiv.innerHTML = "Error connecting to backend.";
            }
        };
    </script>
</body>
</html>
