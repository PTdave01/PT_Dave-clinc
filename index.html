<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTKOP | Enterprise Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: #fff; font-family: sans-serif; }
        .glass { background: #111; border: 1px solid #222; border-radius: 1.5rem; }
        .btn { transition: all 0.2s; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; }
        .btn:active { scale: 0.95; }
        #video-container { position: relative; width: 100%; aspect-ratio: 1; background: #000; border-radius: 2rem; overflow: hidden; }
        video, canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .status-pill { padding: 4px 12px; border-radius: 99px; font-size: 10px; font-weight: 900; }
    </style>
</head>
<body class="p-4 max-w-xl mx-auto">

    <nav class="flex justify-center gap-4 mb-8">
        <button onclick="switchTab('scanner')" class="text-xs font-bold border-b-2 border-green-500 pb-1">SCANNER</button>
        <button onclick="switchTab('records')" class="text-xs font-bold text-gray-500 pb-1">RECORDS</button>
    </nav>

    <div id="tab-scanner">
        <div id="video-container" class="mb-6 border-2 border-zinc-800">
            <video id="webcam" autoplay playsinline></video>
            <canvas id="output_canvas"></canvas>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="glass p-6 text-center">
                <p class="text-[10px] text-gray-500 uppercase mb-1">Live Angle</p>
                <h2 id="angleDisplay" class="text-5xl font-black italic">--°</h2>
            </div>
            <div id="riskCard" class="glass p-6 text-center border-l-4 border-gray-700">
                <p class="text-[10px] text-gray-500 uppercase mb-1">Risk Level</p>
                <h2 id="riskDisplay" class="text-xs font-black uppercase">Neutral</h2>
            </div>
        </div>

        <div class="glass p-4 mb-4">
            <input id="patientID" type="text" placeholder="ENTER PATIENT ID (e.g. PT-001)" class="w-full bg-transparent text-center text-sm font-bold tracking-tighter outline-none uppercase">
        </div>

        <button id="webcamButton" class="btn w-full bg-white text-black py-5 rounded-2xl mb-3 text-sm">Initialize AI</button>
        <button id="saveButton" class="btn w-full bg-green-600 text-white py-5 rounded-2xl shadow-lg shadow-green-900/20 text-sm">Sync to Frankfurt</button>
    </div>

    <div id="tab-records" class="hidden">
        <div class="glass p-6">
            <h3 class="text-lg font-black mb-4">SEARCH HISTORY</h3>
            <div class="flex gap-2 mb-6">
                <input id="searchID" type="text" placeholder="PT-ID" class="flex-1 bg-zinc-900 border border-zinc-800 rounded-lg p-3 text-sm outline-none">
                <button onclick="fetchRecords()" class="bg-white text-black px-6 rounded-lg font-bold text-xs uppercase">Find</button>
            </div>
            <div id="resultsList" class="space-y-3">
                <p class="text-center text-gray-600 py-10 text-xs italic font-serif">Enter ID to retrieve clinical history...</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { PoseLandmarker, FilesetResolver, DrawingUtils } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0";

        const SUPABASE_URL = "https://yrqlaljrceyupuptrniaj.supabase.co";
        const SUPABASE_KEY = "sb_publishable_0fSp1dxo-j6tnSfpBeAZ5Q_SMQebX19"; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // UI Tabs
        window.switchTab = (tab) => {
            document.getElementById('tab-scanner').classList.toggle('hidden', tab !== 'scanner');
            document.getElementById('tab-records').classList.toggle('hidden', tab !== 'records');
        };

        // Logic Global
        let poseLandmarker; let webcamRunning = false; let lastAngle = 0; let lastStatus = "Awaiting";

        const init = async () => {
            const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm");
            poseLandmarker = await PoseLandmarker.createFromOptions(vision, {
                baseOptions: { modelAssetPath: `https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task`, delegate: "GPU" },
                runningMode: "VIDEO"
            });
        };
        init();

        const video = document.getElementById("webcam");
        const canvas = document.getElementById("output_canvas");
        const ctx = canvas.getContext("2d");

        async function predict() {
            if (!webcamRunning) return;
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            const results = poseLandmarker.detectForVideo(video, performance.now());
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (results.landmarks && results.landmarks[0]) {
                const pts = results.landmarks[0];
                const hip = pts[24]; const knee = pts[26]; const ankle = pts[28];
                const rad = Math.atan2(ankle.y - knee.y, ankle.x - knee.x) - Math.atan2(hip.y - knee.y, hip.x - knee.x);
                let ang = Math.abs(rad * 180.0 / Math.PI);
                ang = ang > 180 ? 360 - ang : ang;
                
                lastAngle = ang.toFixed(1);
                document.getElementById("angleDisplay").innerText = `${lastAngle}°`;

                // RISK LOGIC
                const card = document.getElementById("riskCard");
                const disp = document.getElementById("riskDisplay");
                if (lastAngle < 90) { 
                    lastStatus = "DANGER: Low ROM"; disp.innerText = "RED FLAG"; card.style.borderColor = "#ef4444"; 
                } else if (lastAngle < 120) { 
                    lastStatus = "CAUTION: Stiff"; disp.innerText = "YELLOW ZONE"; card.style.borderColor = "#eab308";
                } else { 
                    lastStatus = "OPTIMAL"; disp.innerText = "GREEN ZONE"; card.style.borderColor = "#22c55e"; 
                }

                new DrawingUtils(ctx).drawConnectors(pts, PoseLandmarker.POSE_CONNECTIONS, { color: '#ffffff33', lineWidth: 1 });
                new DrawingUtils(ctx).drawLandmarks([hip, knee, ankle], { color: '#22c55e', lineWidth: 4 });
            }
            requestAnimationFrame(predict);
        }

        document.getElementById("webcamButton").onclick = async () => {
            if (!webcamRunning) {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream; webcamRunning = true; predict();
                document.getElementById("webcamButton").innerText = "STOP ENGINE";
            } else { location.reload(); }
        };

        document.getElementById("saveButton").onclick = async () => {
            const id = document.getElementById("patientID").value || "GUEST";
            const { error } = await _supabase.from('patient_scans').insert([{ 
                patient_name: id, joint_type: 'Knee', angle_detected: lastAngle, risk_status: lastStatus 
            }]);
            alert(error ? "Error: " + error.message : "✅ SYNCED TO FRANKFURT");
        };

        window.fetchRecords = async () => {
            const id = document.getElementById("searchID").value;
            const list = document.getElementById("resultsList");
            list.innerHTML = "<p class='text-center animate-pulse'>Searching Frankfurt...</p>";
            
            const { data, error } = await _supabase.from('patient_scans')
                .select('*').eq('patient_name', id).order('created_at', { ascending: false }).limit(5);
            
            if (data.length === 0) list.innerHTML = "<p class='text-xs text-red-400'>No records found for this ID.</p>";
            else {
                list.innerHTML = data.map(r => `
                    <div class="bg-zinc-900 p-4 rounded-xl flex justify-between items-center border border-zinc-800">
                        <div>
                            <p class="text-[10px] text-gray-500">${new Date(r.created_at).toLocaleDateString()}</p>
                            <p class="font-black text-sm">${r.angle_detected}°</p>
                        </div>
                        <span class="text-[10px] font-bold uppercase">${r.risk_status}</span>
                    </div>
                `).join('');
            }
        };
    </script>
</body>
</html>
